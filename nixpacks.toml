# Nixpacks configuration for Railway
providers = ["dotnet"]

[phases.setup]
nixPkgs = ["dotnet-sdk_8"]

[phases.build]
cmds = [
  "cd src/ApocalypseLauncher.API",
  "dotnet restore",
  "dotnet publish -c Release -o /app/out"
]

[phases.deploy]
cmd = "cd /app/out && dotnet ApocalypseLauncher.API.dll"

[start]
cmd = "dotnet /app/out/ApocalypseLauncher.API.dll"
